<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Match Kings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero__copy">
          <h1 class="hero__title">Match Kings</h1>
        </div>

        <div class="hero__controls">
          <button class="chrome-button" id="restartButton" type="button">
            Restart
          </button>
        </div>
      </header>

      <section class="tableau" aria-label="Game table">
        <div class="tableau__frame">
          <section class="board" id="board" aria-label="Match Kings board"></section>
        </div>
      </section>

      <footer class="control-bar">
        <div class="control-bar__actions">
          <button
            class="draw-button draw-button--subtract"
            id="subtractButton"
            type="button"
            aria-label="Arm Subtract power-up"
            aria-pressed="false"
          >
            <span class="subtract-button__icon" aria-hidden="true">
              <span></span>
            </span>
            <span class="draw-button__count" id="subtractCount">5</span>
          </button>

          <button class="draw-button" id="drawButton" type="button" aria-label="Draw from pile">
            <span class="draw-button__stack" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="draw-button__text">Draw</span>
            <span class="draw-button__count" id="drawCount">10</span>
          </button>
        </div>
      </footer>
    </main>

    <div class="endgame" id="endgameOverlay" hidden>
      <div class="endgame__scrim" aria-hidden="true"></div>
      <section
        class="endgame__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="endgameTitle"
      >
        <p class="endgame__eyebrow" id="endgameEyebrow">Victory</p>
        <h2 class="endgame__title" id="endgameTitle">Board Cleared</h2>
        <p class="endgame__body" id="endgameBody">You cleared the table.</p>
        <button class="chrome-button chrome-button--primary" id="endgameActionButton" type="button">
          Play Again
        </button>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
